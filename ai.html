<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>Hard-E</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:linear-gradient(135deg,#4f46e5,#8b5cf6);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  padding:10px;
}
.chat{
  width:100%;
  max-width:480px;
  height:90vh;
  background:#1f2937;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border:2px solid rgba(255,255,255,0.1);
}
.chat-header{
  background:#4f46e5;
  color:white;
  text-align:center;
  font-size:22px;
  font-weight:bold;
  padding:18px;
  letter-spacing:1.5px;
}
.messages{
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.msg{
  padding:14px 18px;
  border-radius:20px;
  max-width:80%;
  animation:fadeInUp 0.4s forwards;
  line-height:1.6;
  font-size:15px;
}
.user{
  background:#374151;
  align-self:flex-end;
  color:white;
}
.bot{
  background:#4f46e5;
  align-self:flex-start;
  color:white;
}
@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
.chat-input{
  display:flex;
  border-top:1px solid #374151;
  background:#111827;
}
.chat-input input{
  flex:1;
  padding:18px;
  border:none;
  font-size:16px;
  color:white;
  background:transparent;
}
.chat-input button{
  background:#22c55e;
  border:none;
  padding:0 22px;
  cursor:pointer;
  font-weight:bold;
}
.home{
    background-color: skyblue;
    margin-left: auto;
    order: 0;
    border: 3px solid blue;
    transition: background-color 0.4s ease-in-out;
    transition: border 0.4s ease-in-out;
  text-decoration: none;
}
.chat-input input:focus{outline:none;}
</style>
</head>

<body>
  
<div class="chat">
  
  <div class="chat-header">ℌ𝔞𝔯𝔡-𝔈</div>
  <a class="home" href="index.html">home</a>
  <div class="messages" id="messages"></div>
  <div class="chat-input">
    <input id="input" placeholder="پیامت رو بنویس ">
    <button onclick="send()">ارسال</button>
  </div>
</div>

<script>
const phrases = [
  { key: "سلام", response: "سلام! خوش اومدی 😊" },
  { key: "فیزیک", response: "فیزیک علم بررسی نیرو، انرژی و حرکت است." },
  { key: "پزشکی", response: "پزشکی علم تشخیص و درمان بیماری‌هاست." },
  { key: "CT", response: "شما برای برقراری ارتباط با ما ، تنها کافیست که روی گزینه سی تی بزنید و یکی از گزینه های بله و شاد را انتخاب کرده و سپس شما به پی وی سازنده ، رادین سرلک ، خواهید رفت پیشنهاد می کنم با بله وارد شوید" },
  {key: "signup" , response: "با انجام مراحل ساین آپ ، شما ثبت نام شده و برای ثبت نهایی در جواب سوال مرورگر ، ریممبر را بزنید" },
  {key: "login" , response: "لاگین برای سازنده است و کاربران نمی توانند لاگین کنند" },
  {key: "course" , response: "شما با زدن روی کورس می توانید به صفحه جدید بروید و از دوره ها استفاده کنید" },
  {key: "About us" , response: "این یعنی درباره ما ، اطلاعات کلی سایت" },
  {key: "home" , response: "با زدن این دکمه ، به منوی اصلی سایت می روید" },
];

// پیام خوشامدگویی خودکار (قبل از نوشتن کاربر)
window.onload = () => {
  const messages = document.getElementById("messages");

  const botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.innerHTML = `
سلام 👋  <br>
من یک <b>هوش مصنوعی فارسی‌ زبان</b> هستم <br>☆☆☆☆☆☆☆☆☆☆☆☆☆☆☆☆☆☆☆<br>

می‌توانم درباره موارد زیر پاسخ بدهم:<br>
  
۱️ برخی اطلاعات کلی   <br>
۲️ سوالات مربوط به سایت <br> 
مثال : <br>
چیست CT 
  <br>
  چطور می توانم کنم signup
  <br>
  چی است login
  <br>
  برای search کردن چی کار باید کرد<br>
  <b>پس شما تنها با گفتن کلید واژه ها <br>به صورت انگلیسی و دقیق می توانید اطلاعات کسب کنید</b>


  `;

  messages.appendChild(botMsg);
};

function send() {
  const input = document.getElementById("input");
  const messages = document.getElementById("messages");
  const text = input.value.trim();
  if (!text) return;

  const userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.textContent = text;
  messages.appendChild(userMsg);

  const phrase = phrases.find(p => p.key === text);
  const botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.textContent = phrase
    ? phrase.response
    : "متوجه نشدم 😅 لطفاً سوالت رو واضح‌تر و دقیق تر بپرس";

  messages.appendChild(botMsg);
  messages.scrollTop = messages.scrollHeight;
  input.value = "";
}
</script>
</body>
</html>
